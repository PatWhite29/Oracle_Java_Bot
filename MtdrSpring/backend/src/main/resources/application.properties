spring.jpa.database-platform=org.hibernate.community.dialect.Oracle12cDialect
oracle.jdbc.fanEnabled=false

# Local and container defaults. In Kubernetes these values are provided by
# environment variables and secrets.
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USER:TODOUSER}
spring.datasource.password=${DB_PASSWORD:}
oracle.jdbc.driver-type=${ORACLE_JDBC_DRIVER_TYPE:thin}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

##Properties of UCP
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource
spring.datasource.oracleucp.sql-for-validate-connection=select * from dual
spring.datasource.oracleucp.connection-pool-name=connectionPoolName1
spring.datasource.oracleucp.initial-pool-size=15
spring.datasource.oracleucp.min-pool-size=10
spring.datasource.oracleucp.max-pool-size=30

##Logging properties for UCP
logging.level.root=${LOGGING_LEVEL_ROOT:info}
logging.file.name=logs.log
logging.level.oracle.ucp=${LOGGING_LEVEL_ORACLE_UCP:warn}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:warn}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_ORG_HIBERNATE_BINDER:warn}
logging.level.org.hibernate.type=${LOGGING_LEVEL_ORG_HIBERNATE_TYPE:warn}

deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.url=${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.name=${TELEGRAM_BOT_NAME:OracleBot101_bot}
